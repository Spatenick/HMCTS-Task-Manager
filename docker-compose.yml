services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hmcts-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /data/tasks.db
      CORS_ORIGIN: "*"
    volumes:
      - backend-data:/data
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hmcts-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
